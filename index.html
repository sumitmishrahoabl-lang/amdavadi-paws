<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amdavadi Paws | Pet Hostel & Shop Ahmedabad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>

import React, { useState, useEffect } from 'react';
import { 
  Dog, 
  ShoppingBag, 
  Menu, 
  X, 
  ShoppingCart,
  CheckCircle2,
  ChevronRight,
  Sparkles,
  Search,
  Filter,
  Instagram,
  Facebook
} from 'lucide-react';

// Product Data (16 Items)
const PRODUCTS = [
  { id: 1, name: 'Premium Dog Kibble (Adult)', price: '₹2,499', image: 'https://images.unsplash.com/photo-1589924691995-400dc9ceb709?auto=format&fit=crop&q=80&w=400', category: 'Food' },
  { id: 2, name: 'Interactive Cat Teaser', price: '₹349', image: 'https://images.unsplash.com/photo-1545249390-6bdfa286032f?auto=format&fit=crop&q=80&w=400', category: 'Toys' },
  { id: 3, name: 'Orthopedic Dog Bed', price: '₹1,899', image: 'https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?auto=format&fit=crop&q=80&w=400', category: 'Accessories' },
  { id: 4, name: 'Grain-Free Puppy Treats', price: '₹450', image: 'https://images.unsplash.com/photo-1583337130417-3346a1be7dee?auto=format&fit=crop&q=80&w=400', category: 'Treats' },
  { id: 5, name: 'Reflective Dog Harness', price: '₹899', image: 'https://images.unsplash.com/photo-1544568100-847a948585b9?auto=format&fit=crop&q=80&w=400', category: 'Accessories' },
  { id: 6, name: 'Cat Scratching Post', price: '₹1,299', image: 'https://images.unsplash.com/photo-1591806336026-f825d72071a2?auto=format&fit=crop&q=80&w=400', category: 'Toys' },
  { id: 7, name: 'Grooming Brush Set', price: '₹550', image: 'https://images.unsplash.com/photo-1516734212186-a967f81ad0d7?auto=format&fit=crop&q=80&w=400', category: 'Grooming' },
  { id: 8, name: 'Automatic Water Fountain', price: '₹2,100', image: 'https://images.unsplash.com/photo-1568640347023-a616a30bc3bd?auto=format&fit=crop&q=80&w=400', category: 'Accessories' },
  { id: 9, name: 'Natural Salmon Cat Food', price: '₹1,750', image: 'https://images.unsplash.com/photo-1597843798183-43d1830eb501?auto=format&fit=crop&q=80&w=400', category: 'Food' },
  { id: 10, name: 'Tennis Ball Launcher', price: '₹999', image: 'https://images.unsplash.com/photo-1576201836106-db1758fd1c97?auto=format&fit=crop&q=80&w=400', category: 'Toys' },
  { id: 11, name: 'Leather Dog Collar', price: '₹650', image: 'https://images.unsplash.com/photo-1601758124510-52d02ddb7cbd?auto=format&fit=crop&q=80&w=400', category: 'Accessories' },
  { id: 12, name: 'Organic Dental Chews', price: '₹399', image: 'https://images.unsplash.com/photo-1582718392035-c136a7593c2b?auto=format&fit=crop&q=80&w=400', category: 'Treats' },
  { id: 13, name: 'Anti-Ticking Shampoo', price: '₹420', image: 'https://images.unsplash.com/photo-1628134711291-b387aaaf960e?auto=format&fit=crop&q=80&w=400', category: 'Grooming' },
  { id: 14, name: 'Soft Carrier Bag', price: '₹1,550', image: 'https://images.unsplash.com/photo-1583511655857-d19b40a7a54e?auto=format&fit=crop&q=80&w=400', category: 'Accessories' },
  { id: 15, name: 'Plush Squeaky Toy', price: '₹250', image: 'https://images.unsplash.com/photo-1591769225440-811ad7d6eca3?auto=format&fit=crop&q=80&w=400', category: 'Toys' },
  { id: 16, name: 'High-Calorie Recovery Paste', price: '₹850', image: 'https://images.unsplash.com/photo-1568640347023-a616a30bc3bd?auto=format&fit=crop&q=80&w=400', category: 'Food' },
];

export default function App() {
  const [activeTab, setActiveTab] = useState('home');
  const [isMenuOpen, setIsMenuOpen] = useState(false);
  const [cartCount, setCartCount] = useState(0);
  const [loading, setLoading] = useState(false);
  const [dietResult, setDietResult] = useState('');
  
  // AI States
  const [petType, setPetType] = useState('Dog');
  const [petBreed, setPetBreed] = useState('');
  const [petDetails, setPetDetails] = useState('');
  const [shopFilter, setShopFilter] = useState('All');

  const WHATSAPP_NUMBER = "919930330051"; 

  const generateDiet = async () => {
    if (!petBreed || !petDetails) return;
    setLoading(true);
    setDietResult('');
    
    const apiKey = "AIzaSyCpvTinyRYetv5zNWsyibZB5n1-ThefY1w"; // Handled by environment
    const systemPrompt = "You are an expert veterinary nutritionist. Provide clear, concise, homemade diet advice for pets in India.";
    const userPrompt = `Create a healthy, homemade diet plan for a ${petType} (${petBreed}) that is ${petDetails}. Include portion sizes and ingredients to avoid.`;

    let retries = 0;
    const maxRetries = 5;

    const fetchAIResponse = async () => {
      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: userPrompt }] }],
            systemInstruction: { parts: [{ text: systemPrompt }] }
          })
        });

        if (!response.ok) throw new Error("API Request Failed");
        
        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
        setDietResult(text || "Sorry, I couldn't generate a plan right now.");
        setLoading(false);
      } catch (err) {
        if (retries < maxRetries) {
          retries++;
          const delay = Math.pow(2, retries) * 1000;
          setTimeout(fetchAIResponse, delay);
        } else {
          setLoading(false);
          setDietResult("I'm having trouble connecting to the AI. Please try again later.");
        }
      }
    };

    fetchAIResponse();
  };

  const NavItem = ({ id, label }) => (
    <button 
      onClick={() => { setActiveTab(id); setIsMenuOpen(false); }}
      className={`px-3 py-2 rounded-md font-medium transition-colors ${
        activeTab === id ? 'text-orange-600 bg-orange-50' : 'text-gray-700 hover:text-orange-500'
      }`}
    >
      {label}
    </button>
  );

  return (
    <div className="min-h-screen bg-white text-gray-900 font-sans selection:bg-orange-100">
      {/* Navigation */}
      <nav className="fixed top-0 w-full bg-white/80 backdrop-blur-md border-b z-50">
        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
          <div className="flex justify-between items-center h-20">
            <div className="flex items-center cursor-pointer" onClick={() => setActiveTab('home')}>
              <Dog className="h-8 w-8 text-orange-600 mr-2" />
              <span className="font-bold text-2xl text-teal-900">Amdavadi Paws</span>
            </div>

            <div className="hidden md:flex items-center space-x-4">
              <NavItem id="home" label="Home" />
              <NavItem id="hostel" label="Hostel & Daycare" />
              <NavItem id="shop" label="Shop" />
              <NavItem id="diet" label="AI Diet" />
              
              <div className="relative ml-4 p-2 bg-gray-50 rounded-full cursor-pointer hover:bg-gray-100 transition">
                <ShoppingCart className="h-6 w-6 text-teal-800" />
                {cartCount > 0 && (
                  <span className="absolute -top-1 -right-1 bg-orange-600 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center">
                    {cartCount}
                  </span>
                )}
              </div>
              
              <a 
                href={`https://wa.me/${9930330051}`} 
                className="ml-4 bg-teal-800 text-white px-6 py-2.5 rounded-full font-semibold hover:bg-teal-900 transition shadow-sm"
              >
                Contact Us
              </a>
            </div>

            <button onClick={() => setIsMenuOpen(!isMenuOpen)} className="md:hidden p-2">
              {isMenuOpen ? <X /> : <Menu />}
            </button>
          </div>
        </div>

        {/* Mobile Menu */}
        {isMenuOpen && (
          <div className="md:hidden bg-white border-t px-4 py-6 space-y-4 shadow-xl">
            <button onClick={() => {setActiveTab('home'); setIsMenuOpen(false)}} className="block w-full text-left py-2 font-medium">Home</button>
            <button onClick={() => {setActiveTab('hostel'); setIsMenuOpen(false)}} className="block w-full text-left py-2 font-medium">Hostel</button>
            <button onClick={() => {setActiveTab('shop'); setIsMenuOpen(false)}} className="block w-full text-left py-2 font-medium">Shop</button>
            <button onClick={() => {setActiveTab('diet'); setIsMenuOpen(false)}} className="block w-full text-left py-2 font-medium">AI Diet Plan</button>
          </div>
        )}
      </nav>

      {/* Main Content Area */}
      <main className="pt-20">
        {activeTab === 'home' && (
          <>
            <section className="relative bg-orange-50 py-20 lg:py-32 overflow-hidden">
              <div className="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-12 items-center">
                <div>
                  <h1 className="text-5xl lg:text-7xl font-extrabold text-teal-950 leading-[1.1] mb-6">
                    Luxury Pet Care in <span className="text-orange-600">Ahmedabad</span>
                  </h1>
                  <p className="text-xl text-gray-600 mb-8 max-w-lg">
                    Boarding, Daycare, and Premium Supplies. Your furry friend deserves the best, right here in the heart of Gujarat.
                  </p>
                  <div className="flex flex-wrap gap-4">
                    <button onClick={() => setActiveTab('hostel')} className="bg-teal-800 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-teal-900 transition flex items-center shadow-lg">
                      Book Hostel <ChevronRight className="ml-2 h-5 w-5" />
                    </button>
                    <button onClick={() => setActiveTab('shop')} className="bg-white text-teal-900 border-2 border-teal-100 px-8 py-4 rounded-2xl font-bold text-lg hover:bg-teal-50 transition">
                      Shop Now
                    </button>
                  </div>
                </div>
                <div className="relative">
                  <div className="absolute inset-0 bg-orange-200 rounded-full blur-3xl opacity-30 animate-pulse"></div>
                  <img 
                    src="https://images.unsplash.com/photo-1548199973-03cce0bbc87b?auto=format&fit=crop&q=80&w=800" 
                    className="relative z-10 rounded-[3rem] shadow-2xl border-4 border-white h-[500px] w-full object-cover"
                    alt="Happy pets"
                  />
                </div>
              </div>
            </section>
          </>
        )}

        {activeTab === 'hostel' && (
          <section className="py-20 bg-white">
            <div className="max-w-7xl mx-auto px-4">
              <div className="text-center mb-16">
                <h2 className="text-4xl font-bold text-teal-950 mb-4">Boarding & Daycare</h2>
                <p className="text-gray-500 max-w-2xl mx-auto">Cage-free, loving environment for your pets while you're away.</p>
              </div>
              <div className="grid md:grid-cols-2 gap-8">
                <div className="bg-white p-8 rounded-[2rem] border-2 border-orange-50 hover:border-orange-200 transition">
                  <h3 className="text-2xl font-bold text-teal-900 mb-2">Daycare</h3>
                  <p className="text-gray-500 mb-6">Perfect for 8 AM to 8 PM care.</p>
                  <div className="text-4xl font-black text-orange-600 mb-8">₹399 <span className="text-sm font-normal text-gray-400">/day</span></div>
                  <ul className="space-y-4 mb-8">
                    {['AC Play Zone', 'Professional Caretakers', 'Updates via WhatsApp'].map(item => (
                      <li key={item} className="flex items-center gap-3"><CheckCircle2 className="text-green-500 h-5 w-5"/> {item}</li>
                    ))}
                  </ul>
                  <button className="w-full py-4 bg-teal-800 text-white rounded-2xl font-bold hover:bg-teal-900">Book Daycare</button>
                </div>
                <div className="bg-teal-950 p-8 rounded-[2rem] text-white shadow-2xl">
                  <h3 className="text-2xl font-bold mb-2">Overnight Hostel</h3>
                  <p className="text-teal-200 mb-6">24/7 premium stay with meals.</p>
                  <div className="text-4xl font-black text-orange-500 mb-8">₹799 <span className="text-sm font-normal text-teal-300">/night</span></div>
                  <ul className="space-y-4 mb-8">
                    {['Individual Sleeping Suites', 'Home Cooked Meals', 'Medical Supervision'].map(item => (
                      <li key={item} className="flex items-center gap-3"><CheckCircle2 className="text-orange-400 h-5 w-5"/> {item}</li>
                    ))}
                  </ul>
                  <button className="w-full py-4 bg-orange-600 text-white rounded-2xl font-bold hover:bg-orange-700">Book Overnight</button>
                </div>
              </div>
            </div>
          </section>
        )}

        {activeTab === 'shop' && (
          <section className="py-20 min-h-screen bg-gray-50">
            <div className="max-w-7xl mx-auto px-4">
              <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
                <div>
                  <h2 className="text-4xl font-bold text-teal-950 mb-2">The Pet Shop</h2>
                  <p className="text-gray-500">Curated products for Ahmedabad's finest pets.</p>
                </div>
                <div className="flex gap-2 overflow-x-auto w-full md:w-auto pb-2">
                  {['All', 'Food', 'Toys', 'Accessories', 'Treats', 'Grooming'].map(cat => (
                    <button 
                      key={cat}
                      onClick={() => setShopFilter(cat)}
                      className={`px-5 py-2 rounded-full text-sm font-bold transition whitespace-nowrap ${shopFilter === cat ? 'bg-orange-600 text-white' : 'bg-white text-gray-600 border'}`}
                    >
                      {cat}
                    </button>
                  ))}
                </div>
              </div>
              <div className="grid grid-cols-2 lg:grid-cols-4 gap-6">
                {PRODUCTS.filter(p => shopFilter === 'All' || p.category === shopFilter).map(product => (
                  <div key={product.id} className="bg-white rounded-3xl p-4 shadow-sm hover:shadow-xl transition group">
                    <div className="aspect-square rounded-2xl overflow-hidden mb-4 bg-gray-100">
                      <img src={product.image} className="w-full h-full object-cover group-hover:scale-110 transition duration-500" alt={product.name} />
                    </div>
                    <span className="text-[10px] font-black text-orange-600 uppercase tracking-widest">{product.category}</span>
                    <h4 className="font-bold text-teal-950 mt-1 line-clamp-1">{product.name}</h4>
                    <div className="flex justify-between items-center mt-4">
                      <span className="text-lg font-black">{product.price}</span>
                      <button 
                        onClick={() => setCartCount(c => c + 1)}
                        className="p-2 bg-teal-50 text-teal-800 rounded-xl hover:bg-teal-800 hover:text-white transition"
                      >
                        <ShoppingCart className="h-5 w-5" />
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </section>
        )}

        {activeTab === 'diet' && (
          <section className="py-20 bg-orange-50 min-h-screen flex items-center">
            <div className="max-w-3xl mx-auto px-4 w-full">
              <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden">
                <div className="bg-teal-950 p-10 text-center text-white">
                  <Sparkles className="h-10 w-10 text-orange-400 mx-auto mb-4" />
                  <h2 className="text-3xl font-bold mb-2">AI Nutrition Planner</h2>
                  <p className="text-teal-200 opacity-80">Free custom diet plans generated by Gemini AI</p>
                </div>
                <div className="p-8 lg:p-12 space-y-6">
                  <div className="grid md:grid-cols-2 gap-6">
                    <div>
                      <label className="text-xs font-bold uppercase text-gray-400 mb-2 block">Pet Type</label>
                      <select 
                        value={petType} 
                        onChange={e => setPetType(e.target.value)}
                        className="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-orange-400 outline-none"
                      >
                        <option>Dog</option>
                        <option>Cat</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-xs font-bold uppercase text-gray-400 mb-2 block">Breed</label>
                      <input 
                        type="text" 
                        value={petBreed}
                        onChange={e => setPetBreed(e.target.value)}
                        placeholder="e.g. Indie, Persian"
                        className="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-orange-400 outline-none"
                      />
                    </div>
                  </div>
                  <div>
                    <label className="text-xs font-bold uppercase text-gray-400 mb-2 block">Age & Weight</label>
                    <input 
                      type="text" 
                      value={petDetails}
                      onChange={e => setPetDetails(e.target.value)}
                      placeholder="e.g. 3 years, 12kg"
                      className="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-orange-400 outline-none"
                    />
                  </div>
                  <button 
                    onClick={generateDiet}
                    disabled={loading || !petBreed || !petDetails}
                    className="w-full py-5 bg-orange-600 text-white rounded-2xl font-black text-lg hover:bg-orange-700 transition shadow-lg disabled:opacity-50"
                  >
                    {loading ? 'AI IS THINKING...' : 'GENERATE PLAN'}
                  </button>

                  {dietResult && (
                    <div className="mt-10 p-8 bg-teal-50 rounded-[2rem] border border-teal-100 animate-in fade-in slide-in-from-bottom-4 duration-500">
                      <h4 className="font-bold text-teal-950 mb-4 flex items-center">
                        <CheckCircle2 className="mr-2 text-green-600 h-5 w-5" /> Your Customized Diet
                      </h4>
                      <div className="text-gray-700 leading-relaxed whitespace-pre-wrap text-sm md:text-base">
                        {dietResult}
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          </section>
        )}
      </main>

      {/* Footer */}
      <footer className="bg-teal-950 text-white pt-20 pb-10">
        <div className="max-w-7xl mx-auto px-4 grid md:grid-cols-4 gap-12 mb-16">
          <div className="col-span-2">
            <div className="flex items-center mb-6">
              <Dog className="h-8 w-8 text-orange-500 mr-2" />
              <span className="font-bold text-2xl">Amdavadi Paws</span>
            </div>
            <p className="text-teal-200 max-w-sm mb-6">
              Providing premium pet services across Ahmedabad. From Vastrapur to Satellite, we bring the best care to your doorstep.
            </p>
            <div className="flex gap-4">
              <Instagram className="h-6 w-6 text-orange-400 cursor-pointer" />
              <Facebook className="h-6 w-6 text-orange-400 cursor-pointer" />
            </div>
          </div>
          <div>
            <h4 className="font-bold mb-6">Quick Links</h4>
            <ul className="space-y-4 text-teal-200 text-sm">
              <li className="cursor-pointer hover:text-white" onClick={() => setActiveTab('hostel')}>Boarding</li>
              <li className="cursor-pointer hover:text-white" onClick={() => setActiveTab('shop')}>Pet Store</li>
              <li className="cursor-pointer hover:text-white" onClick={() => setActiveTab('diet')}>AI Diet</li>
            </ul>
          </div>
          <div>
            <h4 className="font-bold mb-6">Contact</h4>
            <p className="text-sm text-teal-200 mb-4">Bodakdev, Ahmedabad, Gujarat 380054</p>
            <p className="text-sm text-teal-200">hello@amdavadipaws.in</p>
          </div>
        </div>
        <div className="max-w-7xl mx-auto px-4 border-t border-teal-900 pt-8 text-center text-teal-400 text-xs">
          © {new Date().getFullYear()} Amdavadi Paws. All rights reserved.
        </div>
      </footer>
    </div>
  );
}
