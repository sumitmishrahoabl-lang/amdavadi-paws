<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amdavadi Paws | Pet Hostel & Shop Ahmedabad</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .cart-sidebar { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; }
        .cart-open { transform: translateX(0); }
        .cart-closed { transform: translateX(100%); }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-x-hidden">

    <!-- Navigation -->
    <nav class="fixed w-full z-50 top-0 glass-nav border-b border-slate-200/50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.scrollTo(0,0)">
                <i data-lucide="dog" class="text-orange-500 w-8 h-8"></i>
                <span class="font-extrabold text-2xl text-teal-900 tracking-tight">Amdavadi Paws</span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleCart(true)" class="relative p-3 bg-white border border-slate-200 rounded-2xl text-teal-900 hover:bg-slate-50 transition">
                    <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                    <span id="cart-badge" class="absolute -top-1 -right-1 bg-orange-600 text-white text-[10px] font-black px-2 py-0.5 rounded-full ring-2 ring-white">0</span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="pt-40 pb-20 px-4 bg-gradient-to-br from-orange-50 via-white to-teal-50/30">
        <div class="max-w-7xl mx-auto text-center">
            <h1 class="text-5xl md:text-7xl font-extrabold text-teal-950 leading-tight mb-6">
                Ahmedabad's Premium <span class="text-orange-500">Pet Hub.</span>
            </h1>
            <p class="text-lg text-slate-600 mb-10 max-w-2xl mx-auto">Hostel, Shop, and AI-powered care. Your pet's home away from home in Tragad.</p>
            <div class="flex justify-center gap-4">
                <a href="#shop" class="bg-teal-700 text-white px-10 py-5 rounded-[24px] font-bold text-lg shadow-xl hover:bg-teal-800 transition">Browse Shop</a>
            </div>
        </div>
    </section>

    <!-- Shop -->
    <section id="shop" class="py-24 bg-white px-4">
        <div class="max-w-7xl mx-auto">
            <h2 class="text-4xl font-extrabold text-teal-950 mb-12">Curated Pet Shop</h2>
            <div id="product-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
        </div>
    </section>

    <!-- AI Diet Section -->
    <section class="py-24 bg-teal-950 text-white px-4">
        <div class="max-w-4xl mx-auto text-center">
            <h2 class="text-4xl font-extrabold mb-8">AI Diet Planner</h2>
            <div class="bg-white p-8 rounded-[40px] text-slate-900 shadow-2xl text-left">
                <input id="petBreed" type="text" placeholder="Pet Breed (e.g. Labrador)" class="w-full p-4 mb-4 bg-slate-50 border-2 rounded-2xl outline-none focus:border-teal-600 transition">
                <input id="petAge" type="text" placeholder="Age" class="w-full p-4 mb-6 bg-slate-50 border-2 rounded-2xl outline-none focus:border-teal-600 transition">
                <button onclick="getAIDiet()" id="aiBtn" class="w-full bg-orange-500 text-white font-black py-5 rounded-2xl hover:bg-orange-600 transition">Generate Plan</button>
                <div id="aiResultBox" class="hidden mt-6 p-6 bg-orange-50 rounded-3xl text-slate-700">
                    <p id="aiText"></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Cart Sidebar -->
    <div id="sidebar-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[900] hidden"></div>
    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full max-w-md bg-white shadow-2xl cart-sidebar cart-closed flex flex-col z-[1000]">
        <div class="p-8 border-b bg-teal-950 text-white flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-extrabold">Your Cart</h2>
                <p class="text-teal-400 text-xs font-bold uppercase tracking-wider">Add more items below</p>
            </div>
            <button onclick="toggleCart(false)" class="p-2 hover:bg-white/10 rounded-full transition"><i data-lucide="x"></i></button>
        </div>
        
        <div id="cart-list" class="flex-grow overflow-y-auto p-8 space-y-4">
            <!-- Items injected here -->
        </div>

        <div class="p-8 border-t bg-slate-50 space-y-4">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-slate-500 uppercase text-xs">Total</span>
                <span id="cart-total" class="text-3xl font-black text-teal-950">₹0</span>
            </div>
            
            <button onclick="toggleCart(false)" class="w-full bg-white border-2 border-slate-200 text-slate-700 font-bold py-4 rounded-2xl hover:bg-slate-100 transition">
                Continue Shopping
            </button>
            
            <button onclick="startPayment()" id="payBtn" class="w-full bg-orange-600 text-white font-bold py-5 rounded-2xl hover:bg-orange-700 transition shadow-lg flex justify-center items-center gap-2">
                Checkout Now <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const API_KEY_GEMINI = "AIzaSyCpvTinyRYetv5zNWsyibZB5n1-ThefY1w"; // Paste Key Here
        const RAZORPAY_KEY_ID = ""; // Paste Key Here (rzp_test_SRqlvR52ecD25D)

        const PRODUCT_DB = [
            { id: 1, name: "Premium Adult Kibble", price: 1499, img: "https://images.unsplash.com/photo-1589924691995-400dc9ceb709?w=400" },
            { id: 2, name: "Luxury Pet Bed", price: 2450, img: "https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?w=400" },
            { id: 3, name: "Interactive Rope Toy", price: 399, img: "https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=400" },
            { id: 4, name: "Organic Shampoo", price: 650, img: "https://images.unsplash.com/photo-1583337130417-3346a1be7dee?w=400" }
        ];

        let cart = [];

        window.onload = () => {
            lucide.createIcons();
            renderProducts();
        };

        function renderProducts() {
            const container = document.getElementById('product-container');
            container.innerHTML = PRODUCT_DB.map(p => `
                <div class="bg-white p-6 rounded-[32px] border border-slate-100 shadow-sm group">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-2xl mb-4 group-hover:scale-105 transition duration-300">
                    <h3 class="font-bold text-lg">${p.name}</h3>
                    <div class="flex justify-between items-center mt-4">
                        <span class="text-xl font-black text-teal-700">₹${p.price}</span>
                        <button onclick="addToCart(${p.id})" class="bg-teal-700 text-white p-3 rounded-xl hover:bg-orange-500 transition">
                            <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function addToCart(id) {
            const product = PRODUCT_DB.find(p => p.id === id);
            const exists = cart.find(i => i.id === id);
            
            if(exists) {
                exists.quantity++;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            updateCartUI();
            toggleCart(true); // Still show the sidebar so user sees it worked, but they can now "Continue Shopping"
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (!item) return;
            item.quantity += delta;
            if (item.quantity <= 0) {
                cart = cart.filter(i => i.id !== id);
            }
            updateCartUI();
        }

        function updateCartUI() {
            const list = document.getElementById('cart-list');
            const totalEl = document.getElementById('cart-total');
            const badge = document.getElementById('cart-badge');
            
            const totalItems = cart.reduce((s, i) => s + i.quantity, 0);
            const totalCash = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            
            badge.innerText = totalItems;
            totalEl.innerText = `₹${totalCash}`;
            
            if(cart.length === 0) {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-64 text-slate-300">
                        <i data-lucide="shopping-basket" class="w-16 h-16 mb-4"></i>
                        <p class="font-bold">Your cart is empty</p>
                    </div>
                `;
            } else {
                list.innerHTML = cart.map(i => `
                    <div class="flex gap-4 items-center bg-slate-50 p-4 rounded-2xl border border-slate-100">
                        <img src="${i.img}" class="w-16 h-16 object-cover rounded-xl shadow-sm">
                        <div class="flex-grow">
                            <p class="font-bold text-teal-950 text-sm leading-tight">${i.name}</p>
                            <p class="text-teal-600 font-black text-sm">₹${i.price}</p>
                        </div>
                        <div class="flex items-center gap-2 bg-white rounded-lg border px-2 py-1">
                            <button onclick="updateQuantity(${i.id}, -1)" class="hover:text-orange-500"><i data-lucide="minus" class="w-3 h-3"></i></button>
                            <span class="font-bold text-xs min-w-[12px] text-center">${i.quantity}</span>
                            <button onclick="updateQuantity(${i.id}, 1)" class="hover:text-teal-600"><i data-lucide="plus" class="w-3 h-3"></i></button>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function toggleCart(show) {
            const sidebar = document.getElementById('cart-sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('cart-open', show);
            sidebar.classList.toggle('cart-closed', !show);
            overlay.classList.toggle('hidden', !show);
        }

        async function getAIDiet() {
            const btn = document.getElementById('aiBtn');
            const breed = document.getElementById('petBreed').value;
            if(!API_KEY_GEMINI) return alert("Missing API Key!");
            
            btn.innerText = "Consulting AI...";
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY_GEMINI}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: `Diet for ${breed} pet in Ahmedabad.` }] }] })
                });
                const data = await response.json();
                document.getElementById('aiText').innerText = data.candidates[0].content.parts[0].text;
                document.getElementById('aiResultBox').classList.remove('hidden');
            } catch (e) {
                alert("AI Error");
            }
            btn.innerText = "Generate Plan";
        }

        function startPayment() {
            if(!RAZORPAY_KEY_ID) return alert("Enter Razorpay Key ID in the code first.");
            if(cart.length === 0) return alert("Cart is empty.");

            const amount = cart.reduce((s, i) => s + (i.price * i.quantity), 0);

            const options = {
                "key": RAZORPAY_KEY_ID,
                "amount": amount * 100,
                "currency": "INR",
                "name": "Amdavadi Paws",
                "handler": function(res) {
                    alert("Success! Payment ID: " + res.razorpay_payment_id);
                    cart = [];
                    updateCartUI();
                    toggleCart(false);
                },
                "theme": { "color": "#0d9488" }
            };
            const rzp = new Razorpay(options);
            rzp.open();
        }
    </script>
</body>
</html>
