<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amdavadi Paws | Pet Hostel & Shop Ahmedabad</title>

<meta name="description" content="Best pet hostel, daycare and pet shop in Ahmedabad. Book pet stay and shop premium products.">
<meta name="keywords" content="pet hostel Ahmedabad, dog boarding Ahmedabad, pet shop Ahmedabad">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</head>

<body class="bg-slate-50">

<!-- NAVBAR -->
<nav class="fixed top-0 w-full bg-white shadow z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<h1 class="font-bold text-xl text-orange-500">Amdavadi Paws 🐾</h1>

<div class="flex gap-6">
<a href="#hostel">Hostel</a>
<a href="#shop">Shop</a>
<a href="#reviews">Reviews</a>
<a href="#admin">Admin</a>
</div>

<button onclick="toggleCart(true)">
🛒 <span id="cartCount">0</span>
</button>

</div>
</nav>


<!-- HERO -->
<section class="pt-24 bg-gradient-to-br from-orange-50 to-teal-50 p-10 text-center">

<h1 class="text-5xl font-bold mb-4">Luxury Stay for Your Pets 🐶</h1>

<button onclick="openBooking()" class="bg-orange-500 text-white px-6 py-3 rounded">
Book Now
</button>

</section>


<!-- HOSTEL -->
<section id="hostel" class="py-16 text-center">

<h2 class="text-3xl font-bold mb-8">Hostel & Daycare</h2>

<button onclick="openBooking()" class="bg-teal-600 text-white px-6 py-3 rounded m-2">
Daycare ₹399
</button>

<button onclick="openBooking()" class="bg-orange-500 text-white px-6 py-3 rounded m-2">
Overnight ₹799
</button>

</section>


<!-- SHOP -->
<section id="shop" class="py-20">

<h2 class="text-3xl font-bold text-center mb-10">Pet Shop</h2>

<div id="products" class="grid grid-cols-2 md:grid-cols-4 gap-6 max-w-6xl mx-auto"></div>

</section>


<!-- REVIEWS -->
<section id="reviews" class="py-20 bg-white text-center">

<h2 class="text-3xl font-bold mb-10">Loved by Pet Parents ❤️</h2>

<div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto">

<div class="p-6 bg-gray-50 rounded">⭐⭐⭐⭐⭐<p>Best hostel in Ahmedabad.</p><b>- Priya</b></div>
<div class="p-6 bg-gray-50 rounded">⭐⭐⭐⭐⭐<p>Very caring staff.</p><b>- Rahul</b></div>
<div class="p-6 bg-gray-50 rounded">⭐⭐⭐⭐⭐<p>My pet loved it.</p><b>- Sneha</b></div>

</div>

</section>


<!-- ADMIN PANEL -->
<section id="admin" class="py-20 bg-gray-100 text-center">

<h2 class="text-3xl font-bold mb-6">Admin Panel</h2>

<input id="pName" placeholder="Product Name" class="border p-2 m-1">
<input id="pPrice" placeholder="Price" class="border p-2 m-1">
<input id="pImg" placeholder="Image URL" class="border p-2 m-1">

<br>

<button onclick="addProduct()" class="bg-green-500 text-white px-4 py-2 rounded m-2">
Add Product
</button>

<div id="adminList" class="mt-6"></div>

</section>


<!-- CART -->
<div id="cart" style="position:fixed;right:-400px;top:0;width:350px;height:100%;background:white;box-shadow:-5px 0 15px rgba(0,0,0,0.2);padding:20px;transition:0.3s">

<h2 class="text-xl font-bold mb-4">Your Cart</h2>

<div id="cartItems"></div>

<h3 class="mt-4 font-bold">Total: ₹<span id="total">0</span></h3>

<button onclick="checkout()" class="bg-orange-500 text-white w-full mt-4 p-3 rounded">
Pay Now
</button>

</div>


<!-- BOOKING POPUP -->
<div id="popup" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;align-items:center;justify-content:center">

<div class="bg-white p-6 rounded">

<input id="name" placeholder="Your Name" class="border p-2 mb-2"><br>
<input id="pet" placeholder="Pet Name" class="border p-2 mb-2"><br>
<input id="date" type="date" class="border p-2 mb-2"><br>

<button onclick="sendBooking()" class="bg-green-500 text-white p-2 rounded">
Send WhatsApp
</button>

</div>

</div>


<script>

const RAZORPAY_KEY="rzp_test_SRqlvR52ecD25D"

let products = JSON.parse(localStorage.getItem("products")) || [

{name:"Dog Food",price:999,img:"https://images.unsplash.com/photo-1589924691995-400dc9ceb709?w=400"},
{name:"Pet Bed",price:1999,img:"https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?w=400"}

]

let cart=[]

function renderProducts(){

document.getElementById("products").innerHTML = products.map((p,i)=>

`<div class="bg-white p-4 rounded shadow">
<img src="${p.img}" class="h-32 w-full object-cover mb-2 rounded">
<h3>${p.name}</h3>
<p>₹${p.price}</p>
<button onclick="addToCart(${i})" class="bg-teal-600 text-white p-2 mt-2 w-full rounded">Add</button>
</div>`

).join("")

renderAdmin()

}

function addToCart(i){

let found=cart.find(c=>c.name===products[i].name)

if(found){found.qty++}
else{cart.push({...products[i],qty:1})}

updateCart()

}

function updateCart(){

let total=0

document.getElementById("cartItems").innerHTML = cart.map((p,i)=>{

total+=p.price*p.qty

return `<div>
${p.name} x ${p.qty}
<button onclick="pInc(${i})">+</button>
<button onclick="pDec(${i})">-</button>
<button onclick="removeItem(${i})">❌</button>
</div>`

}).join("")

document.getElementById("total").innerText=total
document.getElementById("cartCount").innerText=cart.length

}

function pInc(i){cart[i].qty++;updateCart()}
function pDec(i){if(cart[i].qty>1)cart[i].qty--;updateCart()}
function removeItem(i){cart.splice(i,1);updateCart()}

function toggleCart(open){
document.getElementById("cart").style.right=open?"0":"-400px"
}

function checkout(){

let total=cart.reduce((s,p)=>s+p.price*p.qty,0)

new Razorpay({
key:RAZORPAY_KEY,
amount:total*100,
currency:"INR",
name:"Amdavadi Paws",
handler:()=>{alert("Payment Success");cart=[];updateCart()}
}).open()

}

function openBooking(){
document.getElementById("popup").style.display="flex"
}

function sendBooking(){

const n=document.getElementById("name").value
const p=document.getElementById("pet").value
const d=document.getElementById("date").value

window.open(`https://wa.me/919930330051?text=Booking for ${n}, Pet ${p}, Date ${d}`)

}

function addProduct(){

let p={
name:document.getElementById("pName").value,
price:parseInt(document.getElementById("pPrice").value),
img:document.getElementById("pImg").value
}

products.push(p)

localStorage.setItem("products",JSON.stringify(products))

renderProducts()

}

function deleteProduct(i){

products.splice(i,1)

localStorage.setItem("products",JSON.stringify(products))

renderProducts()

}

function renderAdmin(){

document.getElementById("adminList").innerHTML = products.map((p,i)=>

`<div>${p.name} ₹${p.price} <button onclick="deleteProduct(${i})">Delete</button></div>`

).join("")

}

renderProducts()

</script>

</body>
</html>
