<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amdavadi Paws | Premium Pet Hub Ahmedabad</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{font-family:Arial}
.cart-sidebar{transition:0.4s}
.cart-open{transform:translateX(0)}
.cart-closed{transform:translateX(100%)}
</style>

</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="fixed top-0 w-full bg-white shadow z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center p-4">

<div class="flex items-center gap-2 cursor-pointer" onclick="showPage('home')">
<i data-lucide="dog" class="text-orange-500"></i>
<b class="text-xl">Amdavadi Paws</b>
</div>

<div class="flex gap-6">
<button onclick="showPage('home')">Home</button>
<button onclick="showPage('hostel')">Hostel & Daycare</button>
<button onclick="showPage('shop')">Shop</button>
<button onclick="showPage('ai')">AI Diet</button>
</div>

<button onclick="toggleCart(true)">
<i data-lucide="shopping-cart"></i>
</button>

</div>
</nav>


<!-- HOME -->
<section id="page-home" class="pt-24 text-center">

<h1 class="text-5xl font-bold mb-4">Your Pet's Second Home 🐾</h1>

<p class="text-gray-600 mb-10">
Premium pet boarding and shop in Ahmedabad
</p>

<button onclick="showPage('hostel')" class="bg-teal-600 text-white px-6 py-3 rounded">
Book Hostel
</button>

</section>



<!-- HOSTEL -->
<section id="page-hostel" class="hidden pt-28 max-w-6xl mx-auto">

<h2 class="text-3xl font-bold text-center mb-10">
Luxury Boarding & Daycare
</h2>

<div class="grid md:grid-cols-2 gap-8">

<div class="bg-white p-6 rounded shadow">

<h3 class="text-xl font-bold mb-2">Pawsome Daycare</h3>

<p class="mb-4">₹399 per day</p>

<button onclick="openBooking('Daycare')"
class="bg-orange-500 text-white px-6 py-3 rounded w-full">
Book Daycare
</button>

</div>


<div class="bg-white p-6 rounded shadow">

<h3 class="text-xl font-bold mb-2">Overnight Hostel</h3>

<p class="mb-4">₹799 per night</p>

<button onclick="openBooking('Overnight Hostel')"
class="bg-teal-600 text-white px-6 py-3 rounded w-full">
Book Overnight Stay
</button>

</div>

</div>

</section>



<!-- SHOP -->
<section id="page-shop" class="hidden pt-28 max-w-6xl mx-auto">

<h2 class="text-3xl font-bold mb-10 text-center">Pet Shop</h2>

<div id="product-container" class="grid md:grid-cols-4 gap-6"></div>

</section>



<!-- AI DIET -->
<section id="page-ai" class="hidden pt-28 max-w-xl mx-auto">

<h2 class="text-3xl font-bold mb-6 text-center">
AI Pet Diet Planner
</h2>

<input id="petBreed" placeholder="Pet Breed"
class="border p-3 w-full mb-3">

<input id="petDetails" placeholder="Age / Weight"
class="border p-3 w-full mb-3">

<button onclick="getAIDiet()"
class="bg-orange-500 text-white px-6 py-3 w-full rounded">
Generate Diet
</button>

<div id="aiText" class="mt-6 text-gray-700"></div>

</section>



<!-- BOOKING POPUP -->
<div id="bookingPopup"
style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);align-items:center;justify-content:center;">

<div class="bg-white p-6 rounded w-96">

<h2 class="text-xl font-bold mb-4">Book Pet Service</h2>

<input id="ownerName" placeholder="Your Name"
class="border p-2 w-full mb-2">

<input id="petName" placeholder="Pet Name"
class="border p-2 w-full mb-2">

<input id="bookingDate" type="date"
class="border p-2 w-full mb-4">

<select id="serviceType"
class="border p-2 w-full mb-4">
<option>Daycare</option>
<option>Overnight Hostel</option>
</select>

<button onclick="sendBooking()"
class="bg-orange-500 text-white w-full p-3 rounded">
Send via WhatsApp
</button>

<button onclick="closeBooking()"
class="mt-2 border w-full p-2 rounded">
Cancel
</button>

</div>
</div>



<!-- FLOATING WHATSAPP -->
<a href="https://wa.me/919930330051"
style="position:fixed;bottom:25px;right:25px;background:#25D366;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;color:white">
💬
</a>



<script>

lucide.createIcons()

const WHATSAPP="919930330051"

function showPage(page){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"))
document.getElementById("page-"+page).classList.remove("hidden")
window.scrollTo(0,0)
}



let selectedService=""

function openBooking(service){

selectedService=service

document.getElementById("serviceType").value=service

document.getElementById("bookingPopup").style.display="flex"
}

function closeBooking(){
document.getElementById("bookingPopup").style.display="none"
}



function sendBooking(){

const owner=document.getElementById("ownerName").value
const pet=document.getElementById("petName").value
const date=document.getElementById("bookingDate").value
const service=document.getElementById("serviceType").value

if(!owner||!pet||!date){
alert("Please fill all details")
return
}

const message=`Hello Amdavadi Paws 🐾

Booking Request

Owner Name: ${owner}
Pet Name: ${pet}
Service: ${service}
Date: ${date}

Please confirm availability.`

const url=`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(message)}`

window.open(url)

closeBooking()

}



const products=[
{id:1,name:"Dog Food",price:999,img:"https://images.unsplash.com/photo-1589924691995-400dc9ceb709?w=400"},
{id:2,name:"Pet Bed",price:1999,img:"https://images.unsplash.com/photo-1541781774459-bb2af2f05b55?w=400"},
{id:3,name:"Toy Rope",price:399,img:"https://images.unsplash.com/photo-1545249390-6bdfa286032f?w=400"},
{id:4,name:"Pet Shampoo",price:499,img:"https://images.unsplash.com/photo-1583337130417-3346a1be7dee?w=400"}
]

function renderProducts(){

const container=document.getElementById("product-container")

container.innerHTML=products.map(p=>`

<div class="bg-white p-4 rounded shadow">

<img src="${p.img}" class="h-40 w-full object-cover mb-2">

<h3 class="font-bold">${p.name}</h3>

<p class="text-orange-500 font-bold">₹${p.price}</p>

</div>

`).join("")

}

renderProducts()



async function getAIDiet(){

const breed=document.getElementById("petBreed").value
const details=document.getElementById("petDetails").value

document.getElementById("aiText").innerText=
"Diet recommendation for "+breed+" ("+details+") will appear here."

}

</script>

</body>
</html>
